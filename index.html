<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIKO AI</title>
  <link rel="icon" href="data:;base64,iVBORw0KGgo=" />
  <script src="/dist/face-api.js" defer></script>
  <script src="/app.js" defer></script>
  <style>
    body { background: black; color: white; text-align: center; font-family: sans-serif; }
    video { border: 2px solid white; margin-top: 20px; width: 640px; height: 480px; border-radius: 5px; }
  </style>
</head>
<body>
  <h1>MIKO AI</h1>
  <video id="video" autoplay playsinline></video>

  <script>
    const video = document.getElementById('video');

    navigator.mediaDevices.getUserMedia({ video: true, audio: false })
      .then(stream => {
        video.srcObject = stream;
      })
      .catch(err => {
        console.error("Erreur d'accès à la caméra :", err);
        alert("Impossible d'accéder à la caméra. Vérifie les permissions.");
      });
  </script>
</body>
</html>
